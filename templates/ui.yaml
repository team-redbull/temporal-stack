{{- if .Values.ui.enabled }}
{{- $full := include "temporal-stack.fullname" . -}}
{{- $gateEnabled := eq (include "temporal-stack.uiGateEnabled" .) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-ui
  labels:
    {{- include "temporal-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "temporal-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "temporal-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.ui.auth.enabled }}
      # SA carries the OAuth redirect annotation (see ui-auth.yaml) and is the
      # identity oauth-proxy authenticates as against the OAuth server.
      serviceAccountName: {{ $full }}-ui
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          env:
            - name: TEMPORAL_ADDRESS
              value: "{{ include "temporal-stack.frontendService" . }}:{{ .Values.temporal.frontendPort }}"
            - name: TEMPORAL_UI_PORT
              value: {{ .Values.ui.port | quote }}
            # UI is exposed behind a Route on a different hostname; allow it.
            - name: TEMPORAL_CORS_ORIGINS
              value: "*"
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
        {{- if .Values.ui.auth.enabled }}
        # Authenticating reverse proxy: browsers hit this over the Route, log
        # in via the cluster OAuth server, then get proxied to the UI on
        # localhost. TLS cert/key are minted by the service-ca operator (see
        # the Service annotation below).
        - name: oauth-proxy
          image: "{{ .Values.ui.auth.image.repository }}:{{ .Values.ui.auth.image.tag }}"
          imagePullPolicy: {{ .Values.ui.auth.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          args:
            - --provider=openshift
            - --openshift-service-account={{ $full }}-ui
            - --https-address=:{{ .Values.ui.auth.port }}
            - --http-address=
            {{- if $gateEnabled }}
            # Route through the username-allowlist gate instead of the UI
            # directly — see the gate container below.
            - --upstream=http://localhost:{{ .Values.ui.auth.gate.port }}
            {{- else }}
            - --upstream=http://localhost:{{ .Values.ui.port }}
            {{- end }}
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --cookie-secure=true
            - --skip-provider-button
            {{- with .Values.ui.auth.sar }}
            - --openshift-sar={{ toJson . }}
            {{- end }}
            {{- if $gateEnabled }}
            # Required so the gate sidecar can read the authenticated
            # username off X-Forwarded-User.
            - --pass-user-headers=true
            {{- end }}
          ports:
            - name: proxy
              containerPort: {{ .Values.ui.auth.port }}
          readinessProbe:
            httpGet:
              path: /oauth/healthz
              port: proxy
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /oauth/healthz
              port: proxy
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.ui.auth.resources | nindent 12 }}
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
            - name: proxy-cookie
              mountPath: /etc/proxy/secrets
        {{- end }}
        {{- if $gateEnabled }}
        # Identity allowlist: 403s any authenticated user not explicitly
        # listed in ui.auth.allowedUsers, then proxies the rest to the UI.
        # Sits behind oauth-proxy — nothing outside the pod can reach it or
        # forge the X-Forwarded-User header it trusts.
        - name: username-gate
          image: "{{ .Values.ui.auth.gate.image.repository }}:{{ .Values.ui.auth.gate.image.tag }}"
          imagePullPolicy: {{ .Values.ui.auth.gate.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          ports:
            - name: gate
              containerPort: {{ .Values.ui.auth.gate.port }}
          readinessProbe:
            tcpSocket:
              port: gate
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.auth.gate.resources | nindent 12 }}
          volumeMounts:
            - name: gate-conf
              mountPath: /etc/nginx/conf.d
        {{- end }}
      {{- if .Values.ui.auth.enabled }}
      volumes:
        - name: proxy-tls
          secret:
            secretName: {{ $full }}-ui-proxy-tls
        - name: proxy-cookie
          secret:
            secretName: {{ .Values.ui.auth.existingCookieSecret | default (printf "%s-ui-proxy-cookie" $full) }}
        {{- if $gateEnabled }}
        - name: gate-conf
          configMap:
            name: {{ $full }}-ui-gate-conf
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-ui
  labels:
    {{- include "temporal-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  {{- if .Values.ui.auth.enabled }}
  annotations:
    # service-ca operator mints a TLS cert for the oauth-proxy sidecar and
    # keeps it rotated in this Secret.
    service.beta.openshift.io/serving-cert-secret-name: {{ $full }}-ui-proxy-tls
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "temporal-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    {{- if .Values.ui.auth.enabled }}
    # Only the authenticated proxy port is exposed — the UI's plain HTTP port
    # must not be reachable through the Service, or auth could be bypassed.
    - name: proxy
      port: {{ .Values.ui.auth.port }}
      targetPort: proxy
    {{- else }}
    - name: http
      port: {{ .Values.ui.port }}
      targetPort: http
    {{- end }}
{{- if .Values.ui.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ $full }}-ui
  labels:
    {{- include "temporal-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  {{- with .Values.ui.route.host }}
  host: {{ . | quote }}
  {{- end }}
  to:
    kind: Service
    name: {{ $full }}-ui
    weight: 100
  {{- if .Values.ui.auth.enabled }}
  port:
    targetPort: proxy
  # Reencrypt is forced with auth: the router must terminate edge TLS AND
  # re-encrypt to the oauth-proxy sidecar's service-ca cert (which the router
  # trusts implicitly — no destinationCACertificate needed).
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  {{- else }}
  port:
    targetPort: http
  {{- with .Values.ui.route.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
{{- end }}
