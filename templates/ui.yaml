{{- if .Values.ui.enabled }}
{{- $full := include "temporal-stack.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-ui
  labels:
    {{- include "temporal-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "temporal-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "temporal-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          env:
            - name: TEMPORAL_ADDRESS
              value: "{{ include "temporal-stack.frontendService" . }}:{{ .Values.temporal.frontendPort }}"
            - name: TEMPORAL_UI_PORT
              value: {{ .Values.ui.port | quote }}
            # UI is exposed behind a Route on a different hostname; allow it.
            - name: TEMPORAL_CORS_ORIGINS
              value: "*"
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-ui
  labels:
    {{- include "temporal-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    {{- include "temporal-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: {{ .Values.ui.port }}
      targetPort: http
{{- if .Values.ui.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ $full }}-ui
  labels:
    {{- include "temporal-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  {{- with .Values.ui.route.host }}
  host: {{ . | quote }}
  {{- end }}
  to:
    kind: Service
    name: {{ $full }}-ui
    weight: 100
  port:
    targetPort: http
  {{- with .Values.ui.route.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  wildcardPolicy: None
{{- end }}
{{- end }}
